steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/youtube-ip-backend:$COMMIT_SHA
      - -t
      - gcr.io/$PROJECT_ID/youtube-ip-backend:latest
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - gcr.io/$PROJECT_ID/youtube-ip-backend:$COMMIT_SHA

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - gcr.io/$PROJECT_ID/youtube-ip-backend:latest

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    args:
      - gcloud
      - run
      - deploy
      - youtube-ip-backend
      - --image=gcr.io/$PROJECT_ID/youtube-ip-backend:$COMMIT_SHA
      - --region=us-east1
      - --platform=managed
      - --service-account=youtube-ip-backend@$PROJECT_ID.iam.gserviceaccount.com
      - --set-secrets=ML_BACKEND_API_KEY=ML_BACKEND_API_KEY:latest,GEMINI_API_KEYS=GEMINI_API_KEYS:latest,YOUTUBE_API_KEYS=YOUTUBE_API_KEYS:latest
      - --set-env-vars=GCS_BUCKET=purdue-youtube-ip-models,MODEL_ROOT=gs://purdue-youtube-ip-models/models,FIRESTORE_PROJECT=purdue-youtube-ip
      - --memory=4Gi
      - --cpu=2
      - --timeout=300
      - --concurrency=4
      - --no-allow-unauthenticated

images:
  - gcr.io/$PROJECT_ID/youtube-ip-backend:$COMMIT_SHA
  - gcr.io/$PROJECT_ID/youtube-ip-backend:latest